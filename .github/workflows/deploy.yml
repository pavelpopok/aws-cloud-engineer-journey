name: Deploy Flask to ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'week6/**'
      - '.github/workflows/deploy.yml'

env:
  ECR_REPOSITORY: week6-flask
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./week6/
          echo "Built image: $ECR_REPOSITORY:$IMAGE_TAG"

      - name: Tag and push to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          FULL_IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_IMAGE="$REGISTRY/$ECR_REPOSITORY:latest"
          
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $FULL_IMAGE
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $LATEST_IMAGE
          
          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE
          
          echo "Pushed: $FULL_IMAGE"
          echo "Pushed: $LATEST_IMAGE"

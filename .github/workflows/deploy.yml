name: Deploy Flask to ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "week8-app/**"
      - ".github/workflows/deploy.yml"

env:
  ECR_REPOSITORY: week8-flask
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./week8-app/
          echo "Built image: $ECR_REPOSITORY:$IMAGE_TAG"

      - name: Tag and push to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          FULL_IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_IMAGE="$REGISTRY/$ECR_REPOSITORY:latest"

          docker tag $ECR_REPOSITORY:$IMAGE_TAG $FULL_IMAGE
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $LATEST_IMAGE

          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE

          echo "Pushed: $FULL_IMAGE"
          echo "Pushed: $LATEST_IMAGE"

      - name: Deploy to ECS
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          TASK_FAMILY="week8-task"
          NEW_IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --region ${{ secrets.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          td['containerDefinitions'][0]['image'] = '$NEW_IMAGE'
          for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes', 'compatibilities', 'registeredAt', 'registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --region ${{ secrets.AWS_REGION }} \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $NEW_TASK_ARN"

          aws ecs update-service \
            --region ${{ secrets.AWS_REGION }} \
            --cluster week8-cluster \
            --service week8-service \
            --task-definition $NEW_TASK_ARN \
            --force-new-deployment

          echo "Deployment triggered"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --region ${{ secrets.AWS_REGION }} \
            --cluster week8-cluster \
            --services week8-service
          echo "Deployment complete"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
